version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truescan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models          # persist trained models
      - ./backend/scans.db:/app/scans.db      # persist SQLite DB
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: truescan-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
