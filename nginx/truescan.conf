# TrueScan — Nginx Reverse Proxy Configuration v2
# ==================================================
# Supports BOTH local dev (self-signed) and production (Let's Encrypt / Certbot).
#
# ── Local development (self-signed cert) ──────────────────────────────────────
# 1. Generate certs:   ./scripts/generate_ssl.ps1   (Windows)
#                  or  ./scripts/generate_ssl.sh     (Linux/Mac)
# 2. Edit /etc/hosts:  127.0.0.1  truescan.local
# 3. Copy this file:   sudo cp nginx/truescan.conf /etc/nginx/sites-available/truescan
# 4. Enable:           sudo ln -s /etc/nginx/sites-available/truescan \
#                                 /etc/nginx/sites-enabled/truescan
# 5. Test & reload:    sudo nginx -t && sudo systemctl reload nginx
#
# ── Production (Let's Encrypt) ────────────────────────────────────────────────
# Replace ssl_certificate paths with certbot output, or simply run:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot will auto-edit this file.
# =============================================================================

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name truescan.local yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name truescan.local yourdomain.com www.yourdomain.com;

    # ── SSL certificates ──────────────────────────────────────────────────────
    # Local dev (self-signed — generated by scripts/generate_ssl.sh/.ps1):
    ssl_certificate     /etc/nginx/ssl/truescan.crt;
    ssl_certificate_key /etc/nginx/ssl/truescan.key;
    # Production (uncomment and run certbot):
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling (production only)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:;" always;

    # ── Upload size (for image/video/audio/bulk) ──────────────────────────────
    client_max_body_size 150M;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Auth endpoints (tighter rate limit) ──────────────────────────────────
    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API (FastAPI) ─────────────────────────────────────────────────
    location /detect/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # ML inference can be slow
        proxy_send_timeout 180s;
    }

    location /factcheck/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket (real-time progress) ────────────────────────────────────────
    location /detect/ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Health check (no rate limit, no logging) ──────────────────────────────
    location /health {
        proxy_pass  http://backend;
        access_log  off;
    }

    location /docs {
        proxy_pass http://backend;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # ── Static assets (aggressive caching) ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|avif)$ {
        proxy_pass           http://frontend;
        expires              1y;
        add_header           Cache-Control "public, immutable";
        proxy_cache_bypass   $http_upgrade;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/truescan-access.log combined;
    error_log  /var/log/nginx/truescan-error.log warn;
}
